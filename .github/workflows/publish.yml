name: Publish npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm test

      - name: Publish @cursor-translate/core
        run: npm publish -w @cursor-translate/core --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @cursor-translate/mcp
        run: npm publish -w @cursor-translate/mcp --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish cursor-translate
        run: npm publish -w cursor-translate --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
